name: AI HOT RSS to Feishu

on:
  schedule:
    - cron: "0 0,1,3,5,6-23 * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Trigger reason"
        required: false
        default: "manual"

permissions:
  contents: write

concurrency:
  group: ai-hot-rss-feishu
  cancel-in-progress: false

jobs:
  rss:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Show revision
        run: |
          git rev-parse HEAD
          git log --oneline -1

      - name: Run RSS push
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}
          AGNES_BASE_URL: ${{ secrets.AGNES_BASE_URL }}
          AGNES_MODEL: ${{ secrets.AGNES_MODEL }}
          KEYWORDS: ${{ vars.KEYWORDS }}
        run: npm start

      - name: Persist seen cache
        run: |
          if [[ -n "$(git status --porcelain data/seen.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/seen.json
            git commit -m "chore: update rss seen cache"
            git push
          else
            echo "No seen cache changes."
          fi
